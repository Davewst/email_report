name: 'Email Security Report'
description: 'Emails a container scan report as an attachment via the host mail relay'

inputs:
  report_path:
    description: 'Path to the report file to attach'
    required: true
  recipients:
    description: 'Comma-separated recipient emails'
    required: true
  sender:
    description: 'From address (-r); must be allowed by the relay'
    required: true
  subject:
    description: 'Email subject'
    required: true
  body:
    description: 'Email body text (keep any CUI markings here)'
    required: false
    default: 'Please find attached the latest container scan report.'

runs:
  using: 'composite'
  steps:
    - name: Send report email
      shell: bash
      env:
        REPORT_PATH: ${{ inputs.report_path }}
        RECIPIENTS:  ${{ inputs.recipients }}
        SENDER:      ${{ inputs.sender }}
        SUBJECT:     ${{ inputs.subject }}
        BODY:        ${{ inputs.body }}
      run: python3 ${{ github.action_path }}/send_report.py
